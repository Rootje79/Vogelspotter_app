<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Waarneming.nl naar App & Sheet</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f4f8; }
        .box { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 200px; margin: 15px 0; font-family: monospace; font-size: 12px; padding: 10px; border: 2px solid #ddd; box-sizing: border-box; }
        button { background: #1e40af; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        #status { margin-top: 15px; padding: 10px; border-radius: 6px; display: none; text-align: center; }
        .log-box { background: #1e293b; color: #38bdf8; padding: 15px; border-radius: 8px; margin-top: 15px; font-family: monospace; font-size: 11px; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="box">
    <h2>🇳l Waarneming.nl naar App & Sheet</h2>
    <div id="status"></div>
    
    <p>Plak de Waarneming.nl CSV inhoud hieronder:</p>
    <textarea id="csvInput" placeholder="ID,Datum,Soort..."></textarea>
    
    <button onclick="convert()">CONVERTEER VOOR SYNC 🚀</button>

    <div id="log" class="log-box">Status: Wachten op actie...</div>

    <h3 style="margin-top:20px;">JSON voor Import:</h3>
    <textarea id="jsonOutput" readonly></textarea>
    <button id="downloadBtn" style="display:none; background:#10b981; margin-top:10px;" onclick="download()">DOWNLOAD .JSON</button>
</div>

<script>
let vogelAtlas = [];

async function init() {
    const log = document.getElementById('log');
    try {
        const res = await fetch('soorten.json');
        vogelAtlas = await res.json();
        log.innerHTML = "✅ soorten.json geladen.";
    } catch (e) {
        log.innerHTML = "⚠️ Let op: soorten.json niet gevonden.";
    }
}

// Datum converter voor Google Sheets (YYYY-MM-DD HH:mm:ss)
function formatSheetDate(dateStr) {
    try {
        // Waarneming.nl datums zijn vaak "YYYY-MM-DD" of "DD-MM-YYYY"
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        const pad = (num) => num.toString().padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    } catch (e) {
        return dateStr;
    }
}

function convert() {
    const input = document.getElementById('csvInput').value.trim();
    if (!input) return;

    const lines = input.split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
    
    // Indexen zoeken (Waarneming.nl namen)
    const iSpecies = headers.indexOf('species_name') !== -1 ? headers.indexOf('species_name') : headers.indexOf('soort_naam');
    const iDate = headers.indexOf('date') !== -1 ? headers.indexOf('date') : headers.indexOf('datum');
    const iLat = headers.indexOf('lat');
    const iLon = headers.indexOf('lon');
    const iCount = headers.indexOf('count') !== -1 ? headers.indexOf('count') : headers.indexOf('aantal');
    const iMethod = headers.indexOf('method') !== -1 ? headers.indexOf('method') : headers.indexOf('methode');

    const result = lines.slice(1).map((line, idx) => {
        const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/"/g, ''));
        if (cols.length < 3) return null;

        const soortNaam = cols[iSpecies];
        const match = vogelAtlas.find(v => v.naam && v.naam.toLowerCase() === soortNaam.toLowerCase());

        return {
            id: "WNL-" + (cols[0] || idx),
            species: soortNaam,
            latin: match ? match.WetSchap : "",
            status: match ? match.status : "Onbekend",
            count: parseInt(cols[iCount]) || 1,
            methode: cols[iMethod] || "Gezien",
            tag: "Waarneming Import",
            notes: "",
            timestamp: formatSheetDate(cols[iDate]), // SHEET-SAFE DATUM
            isoDate: cols[iDate],
            synced: false, // FORCEER SYNC NAAR GOOGLE SHEETS
            coords: {
                lat: parseFloat(cols[iLat]) || 52.1,
                lon: parseFloat(cols[iLon]) || 5.2
            }
        };
    }).filter(r => r !== null);

    document.getElementById('jsonOutput').value = JSON.stringify(result, null, 2);
    document.getElementById('downloadBtn').style.display = "block";
    document.getElementById('status').style.display = "block";
    document.getElementById('status').style.background = "#d1fae5";
    document.getElementById('status').innerText = `Klaar! ${result.length} regels voorbereid voor de Sheet Sync.`;
}

function download() {
    const content = document.getElementById('jsonOutput').value;
    const blob = new Blob([content], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = "waarneming_voor_sync.json";
    a.click();
}

init();
</script>
</body>
</html>
