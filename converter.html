<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Waarneming.nl naar Sheet Sync</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f4f8; }
        .box { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 200px; margin: 15px 0; font-family: monospace; font-size: 12px; padding: 10px; border: 2px solid #ddd; box-sizing: border-box; }
        button { background: #1e40af; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        #status { margin-top: 15px; padding: 10px; border-radius: 6px; display: none; text-align: center; font-weight: bold; }
        .log-box { background: #1e293b; color: #fbbf24; padding: 15px; border-radius: 8px; margin-top: 15px; font-family: monospace; font-size: 11px; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="box">
    <h2>🇳l Waarneming.nl -> Sheet Sync</h2>
    <div id="status"></div>
    <p>Plak Waarneming.nl CSV (export):</p>
    <textarea id="csvInput"></textarea>
    <button onclick="convert()">CONVERTEER VOOR SYNC 🚀</button>
    <div id="log" class="log-box">Status: Wachten...</div>
    <textarea id="jsonOutput" readonly style="height:100px;"></textarea>
    <button id="downloadBtn" style="display:none; background:#10b981;" onclick="download()">DOWNLOAD JSON</button>
</div>

<script>
let vogelAtlas = [];
async function init() {
    try {
        const res = await fetch('soorten.json');
        vogelAtlas = await res.json();
        document.getElementById('log').innerHTML = "✅ Atlas geladen.";
    } catch (e) { document.getElementById('log').innerHTML = "⚠️ Atlas niet gevonden."; }
}

function toSheetDate(val) {
    if (!val) return "";
    try {
        let d = new Date(val.split('-').reverse().join('/')); 
        if(isNaN(d.getTime())) d = new Date(val); 
        if (isNaN(d.getTime())) return val;
        const p = (n) => n.toString().padStart(2, '0');
        return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:00`;
    } catch (e) { return val; }
}

function convert() {
    const input = document.getElementById('csvInput').value.trim();
    const lines = input.split(/\r?\n/);
    const sep = lines[0].includes(';') ? ';' : ',';
    const headers = lines[0].toLowerCase().replace(/[^\w,;]/g, '').split(sep).map(h => h.trim());
    
    const iSpecies = headers.findIndex(h => h.includes('soort') || h.includes('species'));
    const iDate = headers.findIndex(h => h.includes('datum') || h.includes('date'));
    const iLoc = headers.findIndex(h => h.includes('location') || h.includes('gebied') || h.includes('plaats'));
    const iLat = headers.findIndex(h => h.includes('lat'));
    const iLon = headers.findIndex(h => h.includes('lon'));

    const results = lines.slice(1).map((line, idx) => {
        if (!line.trim()) return null;
        const cols = line.split(sep).map(c => c.trim().replace(/"/g, ''));
        const soort = cols[iSpecies] || "Onbekend";
        const match = vogelAtlas.find(v => v.naam && v.naam.toLowerCase() === soort.toLowerCase());

        return {
            id: "WNL-" + idx + "-" + Math.floor(Math.random() * 1000),
            species: soort,
            latin: match ? match.WetSchap : "",
            status: match ? match.status : "Onbekend",
            count: 1,
            methode: "Gezien",
            tag: cols[iLoc] || "Waarneming Locatie",
            notes: "Waarneming Import",
            timestamp: toSheetDate(cols[iDate]),
            isoDate: cols[iDate],
            synced: false, 
            coords: { lat: parseFloat(cols[iLat]) || 52.1, lon: parseFloat(cols[iLon]) || 5.2 }
        };
    }).filter(r => r !== null);

    document.getElementById('jsonOutput').value = JSON.stringify(results, null, 2);
    document.getElementById('downloadBtn').style.display = "block";
    document.getElementById('status').style.display = "block";
    document.getElementById('status').innerText = results.length + " regels klaar.";
}

function download() {
    const data = document.getElementById('jsonOutput').value;
    const blob = new Blob([data], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "waarneming_voor_sync.json";
    a.click();
}
init();
</script>
</body>
</html>
