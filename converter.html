<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Waarneming.nl naar Sheet Sync</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f4f8; }
        .box { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 200px; margin: 15px 0; font-family: monospace; font-size: 12px; padding: 10px; border: 2px solid #ddd; box-sizing: border-box; }
        button { background: #1e40af; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        #status { margin-top: 15px; padding: 10px; border-radius: 6px; display: none; text-align: center; font-weight: bold; }
        .log-box { background: #1e293b; color: #fbbf24; padding: 15px; border-radius: 8px; margin-top: 15px; font-family: monospace; font-size: 11px; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="box">
    <h2>🇳l Waarneming.nl -> Sheet Sync</h2>
    <div id="status"></div>
    <p>Plak de inhoud van je Waarneming.nl CSV hieronder:</p>
    <textarea id="csvInput" placeholder="id,date,time,species name..."></textarea>
    <button onclick="convert()">CONVERTEER VOOR SYNC 🚀</button>
    <div id="log" class="log-box">Status: Wachten op data...</div>
    <textarea id="jsonOutput" readonly style="height:150px;"></textarea>
    <button id="downloadBtn" style="display:none; background:#10b981; margin-top:10px;" onclick="download()">DOWNLOAD JSON</button>
</div>

<script>
let vogelAtlas = [];
async function init() {
    try {
        const res = await fetch('soorten.json');
        vogelAtlas = await res.json();
        document.getElementById('log').innerHTML = "✅ vogelatlas geladen.";
    } catch (e) { document.getElementById('log').innerHTML = "⚠️ Atlas niet gevonden."; }
}

function toSheetDate(dStr, tStr) {
    if (!dStr) return "";
    try {
        // Waarneming.nl heeft datum (YYYY-MM-DD) en tijd (HH:MM:SS) apart
        return `${dStr} ${tStr || "12:00:00"}`;
    } catch (e) { return dStr; }
}

function convert() {
    const input = document.getElementById('csvInput').value.trim();
    const lines = input.split(/\r?\n/);
    if(lines.length < 2) return;

    // In jouw bestand is het een komma
    const headers = lines[0].toLowerCase().split(',').map(h => h.trim());
    
    // Indexen op basis van jouw specifieke CSV
    const iSpecies = headers.indexOf('species name');
    const iSci = headers.indexOf('scientific name');
    const iDate = headers.indexOf('date');
    const iTime = headers.indexOf('time');
    const iLoc = headers.indexOf('location');
    const iLat = headers.indexOf('lat');
    const iLon = headers.indexOf('lng'); // Waarneming gebruikt 'lng'
    const iCount = headers.indexOf('number');
    const iNotes = headers.indexOf('notes');

    const results = lines.slice(1).map((line, idx) => {
        if (!line.trim()) return null;
        
        // Split op komma, maar negeer komma's binnen quotes (voor locaties)
        const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/"/g, ''));
        
        const soort = cols[iSpecies] || "Onbekend";
        const match = vogelAtlas.find(v => v.naam && v.naam.toLowerCase() === soort.toLowerCase());

        // Coördinaten direct ophalen als Number voor maximale precisie
        const latVal = cols[iLat];
        const lonVal = cols[iLon];

        return {
            id: "WNL-" + cols[0], // Gebruik het originele Waarneming ID
            species: soort,
            latin: cols[iSci] || (match ? match.WetSchap : ""),
            status: match ? match.status : "Onbekend",
            count: parseInt(cols[iCount]) || 1,
            methode: "Gezien",
            tag: cols[iLoc] || "Waarneming", // Locatie in de TAG
            notes: "Waarneming Import" + (cols[iNotes] ? ": " + cols[iNotes] : ""), // "Import" in de NOTES
            timestamp: toSheetDate(cols[iDate], cols[iTime]),
            isoDate: cols[iDate],
            synced: false, 
            coords: { 
                lat: latVal ? Number(latVal) : 52.1, 
                lon: lonVal ? Number(lonVal) : 5.2 
            }
        };
    }).filter(r => r !== null);

    document.getElementById('jsonOutput').value = JSON.stringify(results, null, 2);
    document.getElementById('downloadBtn').style.display = "block";
    document.getElementById('status').style.display = "block";
    document.getElementById('status').innerText = `✅ ${results.length} waarnemingen verwerkt!`;
    document.getElementById('log').innerHTML = `✅ Kolommen herkend. Lat: ${iLat}, Lng: ${iLon}.`;
}

function download() {
    const data = document.getElementById('jsonOutput').value;
    const blob = new Blob([data], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "waarneming_sheet_ready.json";
    a.click();
}
init();
</script>
</body>
</html>
