<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VogelSpotter Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <h1>🐦 VogelSpotter</h1>
        <div id="gps-indicator">📍 GPS zoeken...</div>
    </header>

    <main>
        <details open class="section-card">
            <summary><h2>Nieuwe Waarneming</h2></summary>
            <form id="obsForm">
                <div class="input-group">
                    <label>Vogelsoort</label>
                    <input type="text" id="speciesInput" list="vogelLijst" placeholder="Typ soortnaam..." required>
                    <datalist id="vogelLijst"></datalist>
                </div>
                <div class="input-group">
                    <label>Wetenschappelijke naam</label>
                    <input type="text" id="latinInput" placeholder="Automatisch via lijst...">
                </div>
                <div class="row">
                    <div class="input-group">
                        <label>Aantal</label>
                        <input type="number" id="countInput" value="1" min="1">
                    </div>
                    <div class="input-group">
                        <label>Locatietag</label>
                        <input type="text" id="tagInput" placeholder="Bijv. Hut 1">
                    </div>
                </div>
                <div class="input-group">
                    <label>Notities</label>
                    <textarea id="noteInput" rows="2"></textarea>
                </div>
                <button type="submit" id="saveBtn">OPSLAAN OP TELEFOON 💾</button>
            </form>
        </details>

        <details class="section-card">
            <summary><h2>Statistieken & Lifelist</h2></summary>
            <div class="stats-grid">
                <div class="stat-item"><span class="stat-label">Soorten</span><span id="totalSpecies" class="stat-value">0</span></div>
                <div class="stat-item"><span class="stat-label">Vogels</span><span id="totalBirds" class="stat-value">0</span></div>
            </div>
            <ul id="lifelist" class="scroll-list"></ul>
        </details>

        <section class="section-card">
            <div class="header-row">
                <h2>Waarnemingen</h2>
                <button id="syncBtn" onclick="synchroniseerData()">Sync ☁️</button>
            </div>
            <div id="obsList"></div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
