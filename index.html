<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VogelSpotter Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="vogelspotter-icon.png">
</head>
<body>
    <header>
        <h1>🐦 VogelSpotter</h1>
        <div id="gps-indicator">📍 GPS initialiseren...</div>
    </header>

    <main>
        <section class="section-card">
            <form id="obsForm">
                <div class="input-group">
                    <label>Vogelsoort</label>
                    <input type="text" id="speciesInput" list="vogelLijst" placeholder="Zoek soort..." required>
                    <datalist id="vogelLijst"></datalist>
                </div>
                <input type="hidden" id="latinInput">
                
                <div class="row">
                    <div class="input-group">
                        <label>Aantal</label>
                        <input type="number" id="countInput" value="1" min="1">
                    </div>
                    <div class="input-group">
                        <label>Locatietag</label>
                        <input type="text" id="tagInput" placeholder="Bijv. Hut 1">
                    </div>
                </div>

                <div class="input-group">
                    <label>Datum & Tijd (vooraf ingevuld op NU)</label>
                    <input type="datetime-local" id="manualTimestamp">
                </div>
                
                <div class="input-group">
                    <label>Notities</label>
                    <textarea id="noteInput" rows="2" placeholder="Bijzonderheden..."></textarea>
                </div>
                <button type="submit" id="saveBtn">WAARNEMING OPSLAAN 💾</button>
            </form>
        </section>

        <section class="section-card">
            <div class="stats-grid">
                <div class="stat-item total">
                    <span class="stat-label">Life List</span>
                    <span id="totalSpecies" class="stat-value">0</span>
                </div>
                <div class="stat-item today">
                    <span class="stat-label">Vandaag</span>
                    <span id="speciesToday" class="stat-value">0</span>
                </div>
                <div class="stat-item year">
                    <span class="stat-label">Jaar 2026</span>
                    <span id="speciesYear" class="stat-value">0</span>
                </div>
            </div>
        </section>

        <details class="section-card">
            <summary>📍 Locatie Beheer (Handmatig)</summary>
            <div style="margin-top:15px;">
                <div class="input-group">
                    <label>Naam nieuwe plek</label>
                    <input type="text" id="manualTagName" placeholder="Bijv. Uitkijktoren">
                </div>
                <div class="row">
                    <div class="input-group">
                        <label>Lat (Breedte)</label>
                        <input type="number" id="manualLat" step="any" placeholder="52.123">
                    </div>
                    <div class="input-group">
                        <label>Lon (Lengte)</label>
                        <input type="number" id="manualLon" step="any" placeholder="5.456">
                    </div>
                </div>
                <button onclick="voegLocatieHandmatigToe()" style="background:var(--accent); color:white; border:none; padding:10px; width:100%; border-radius:8px; font-weight:bold;">Locatie Toevoegen</button>
                <div id="tagList" style="margin-top:10px; font-size:0.8rem;"></div>
            </div>
        </details>

        <details class="section-card">
            <summary>⚙️ App Instellingen & Backup</summary>
            <div style="margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
                <button onclick="exporteerData()" style="width:100%; background:#666; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; margin-bottom:15px;">📥 Download Back-up (.json)</button>
                
                <div style="background:#f9f9f9; padding:10px; border-radius:8px; border:1px solid #ddd;">
                    <label style="font-size:0.7rem; font-weight:bold; display:block; margin-bottom:5px;">Upload Back-up bestand:</label>
                    <input type="file" id="importFile" accept=".json" style="font-size:0.8rem; width:100%;">
                    <button onclick="startDeImport()" style="margin-top:10px; width:100%; background:var(--accent); color:white; border:none; padding:10px; border-radius:8px; font-weight:bold;">START IMPORT</button>
                </div>
            </div>
        </details>

        <section class="section-card">
            <div class="list-header">
                <input type="text" id="searchObs" placeholder="Zoek in lijst..." oninput="renderObservations()">
                <button id="syncBtn" onclick="synchroniseerData()">Sync ☁️</button>
            </div>

            <div class="filter-bar">
                <button id="btnAll" onclick="toggleFilter('alles')">Alles</button>
                <button id="btnToday" class="active" onclick="toggleFilter('vandaag')">Vandaag</button>
                <button id="btnPending" onclick="toggleFilter('pending')">Niet gesynct</button>
            </div>

            <div id="obsList"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
