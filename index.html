<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VogelSpotter Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="vogelspotter-icon.png">
</head>
<body>
    <header>
        <h1>🐦 VogelSpotter</h1>
        <div id="gps-indicator">📍 GPS initialiseren...</div>
    </header>

    <main>
        <section class="section-card">
            <form id="obsForm">
                <div class="input-group">
                    <label>Vogelsoort</label>
                    <input type="text" id="speciesInput" list="vogelLijst" placeholder="Zoek soort..." required>
                    <datalist id="vogelLijst"></datalist>
                </div>
                <input type="hidden" id="latinInput">
                
                <div class="row">
                    <div class="input-group">
                        <label>Aantal</label>
                        <input type="number" id="countInput" value="1" min="1">
                    </div>
                    <div class="input-group">
                        <label>Locatietag</label>
                        <input type="text" id="tagInput" placeholder="Bijv. Hut 1">
                    </div>
                </div>

                <div class="input-group">
                    <label>Datum & Tijd</label>
                    <input type="datetime-local" id="manualTimestamp">
                </div>
                
                <div class="input-group">
                    <label>Notities</label>
                    <textarea id="noteInput" rows="2" placeholder="Bijzonderheden..."></textarea>
                </div>
                <button type="submit" id="saveBtn">WAARNEMING OPSLAAN 💾</button>
            </form>
        </section>

        <section class="section-card">
            <div class="stats-grid">
                <div class="stat-item total">
                    <span class="stat-label">Life List</span>
                    <span id="totalSpecies" class="stat-value">0</span>
                </div>
                <div class="stat-item today">
                    <span class="stat-label">Vandaag</span>
                    <span id="speciesToday" class="stat-value">0</span>
                </div>
                <div class="stat-item year">
                    <span class="stat-label">Jaar 2026</span>
                    <span id="speciesYear" class="stat-value">0</span>
                </div>
            </div>
        </section>

        <section class="section-card">
            <div class="list-header">
                <input type="text" id="searchObs" placeholder="Zoek in lijst..." oninput="renderObservations()">
                <button id="syncBtn" onclick="synchroniseerData()">Sync ☁️</button>
            </div>

            <div class="filter-bar">
                <button id="btnAll" onclick="toggleFilter('alles')">Alles</button>
                <button id="btnToday" class="active" onclick="toggleFilter('vandaag')">Vandaag</button>
                <button id="btnPending" onclick="toggleFilter('pending')">Niet gesynct</button>
            </div>

            <div id="obsList"></div>
        </section>

        <details class="section-card">
            <summary>📍 Locatie Beheer (Handmatig)</summary>
            <div style="margin-top:15px;">
                <input type="text" id="manualTagName" placeholder="Naam plek" style="margin-bottom:10px;">
                <div class="row">
                    <input type="number" id="manualLat" step="any" placeholder="Lat">
                    <input type="number" id="manualLon" step="any" placeholder="Lon">
                </div>
                <button onclick="voegLocatieHandmatigToe()" class="secondary-btn" style="margin-top:10px;">Locatie Toevoegen</button>
                <div id="tagList" style="margin-top:10px;"></div>
            </div>
        </details>

        <section class="section-card admin-box">
            <h3>⚙️ Systeem & Backup</h3>
            <button onclick="exporteerData()" class="backup-btn">📥 DOWNLOAD BACK-UP (.json)</button>
            
            <div class="import-zone">
                <label>Upload Back-up bestand:</label>
                <input type="file" id="importFile" accept=".json">
                <button onclick="startDeImport()" class="import-confirm-btn">START IMPORT</button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
