<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Birda naar App & Sheet Converter</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f4f8; }
        .box { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 200px; margin: 15px 0; font-family: monospace; font-size: 12px; padding: 10px; border: 2px solid #ddd; box-sizing: border-box; }
        button { background: #1e40af; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        #status { margin-top: 15px; padding: 10px; border-radius: 6px; display: none; text-align: center; }
        .log-box { background: #1e293b; color: #38bdf8; padding: 15px; border-radius: 8px; margin-top: 15px; font-family: monospace; font-size: 11px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="box">
    <h2>🐦 Birda naar App & Sheet</h2>
    <div id="status"></div>
    
    <p>Plak de Birda CSV inhoud hieronder:</p>
    <textarea id="csvInput"></textarea>
    
    <button onclick="convert()">CONVERTEER VOOR SYNC 🚀</button>

    <div id="log" class="log-box">Status: Wachten op actie...</div>

    <h3 style="margin-top:20px;">JSON voor Import:</h3>
    <textarea id="jsonOutput" readonly></textarea>
    <button id="downloadBtn" style="display:none; background:#10b981; margin-top:10px;" onclick="download()">DOWNLOAD .JSON</button>
</div>

<script>
let vogelAtlas = [];

async function init() {
    const log = document.getElementById('log');
    try {
        const res = await fetch('soorten.json');
        vogelAtlas = await res.json();
        log.innerHTML = "✅ soorten.json geladen (" + vogelAtlas.length + " soorten)";
    } catch (e) {
        log.innerHTML = "⚠️ Let op: soorten.json niet gevonden.";
    }
}

// Robuuste CSV parser voor Birda exports
function csvToArray(text) {
    let p = '', c = '', r = [], s = true, l = [''];
    for (let i = 0; i < text.length; i++) {
        c = text[i];
        if (c === '"') { s = !s; }
        else if (c === ',' && s) { l.push(''); }
        else if (c === '\n' && s) { if (p === '\r') l[l.length - 1] = l[l.length - 1].slice(0, -1); r.push(l); l = ['']; }
        else { l[l.length - 1] += c; }
        p = c;
    }
    r.push(l);
    return r;
}

// Functie om datum exact Sheet-vriendelijk te maken
function formatSheetDate(dateStr) {
    try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        const pad = (num) => num.toString().padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    } catch (e) {
        return dateStr;
    }
}

function convert() {
    const input = document.getElementById('csvInput').value.trim();
    const log = document.getElementById('log');
    if (!input) return;

    try {
        const rows = csvToArray(input);
        const headers = rows[0].map(h => h.trim());
        
        const iSci = headers.indexOf('scientificName');
        const iCommon = headers.indexOf('commonName');
        const iLat = headers.indexOf('latitude');
        const iLon = headers.indexOf('longitude');
        const iDate = headers.indexOf('date');
        const iCount = headers.indexOf('count');
        const iSession = headers.indexOf('sessionTitle');

        const finalData = rows.slice(1).filter(r => r[iSci] && r[iSci].trim() !== "").map((cols, idx) => {
            const sciName = cols[iSci].trim();
            const commonName = cols[iCommon] ? cols[iCommon].trim() : "Onbekend";
            
            const match = vogelAtlas.find(v => v.WetSchap && v.WetSchap.toLowerCase() === sciName.toLowerCase());
            
            const sheetDate = formatSheetDate(cols[iDate]);

            return {
                id: "BIRDA-" + (cols[0] || idx), // Gebruik Birda ID
                species: match ? match.naam : commonName,
                latin: sciName,
                status: match ? match.status : "Onbekend",
                count: parseInt(cols[iCount]) || 1,
                methode: "Gezien",
                tag: (cols[iSession] && cols[iSession].trim()) ? cols[iSession] : "Birda Import",
                notes: "",
                timestamp: sheetDate, // Geformatteerd voor Google Sheets
                isoDate: cols[iDate],
                synced: false, // Zet op false zodat de app weet dat hij nog naar Sheets moet!
                coords: {
                    lat: parseFloat(cols[iLat]) || 52.1,
                    lon: parseFloat(cols[iLon]) || 5.2
                }
            };
        });

        document.getElementById('jsonOutput').value = JSON.stringify(finalData, null, 2);
        document.getElementById('downloadBtn').style.display = "block";
        document.getElementById('status').style.display = "block";
        document.getElementById('status').style.background = "#d1fae5";
        document.getElementById('status').innerText = `Succes! ${finalData.length} waarnemingen klaar voor import en sync.`;
        log.innerHTML = "✅ Verwerking voltooid. Importeer dit bestand in de app en start daarna de sync.";

    } catch (err) {
        log.innerHTML = "❌ FOUT: " + err.message;
    }
}

function download() {
    const content = document.getElementById('jsonOutput').value;
    const blob = new Blob([content], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = "birda_voor_sheet_sync.json";
    a.click();
}

init();
</script>
</body>
</html>
