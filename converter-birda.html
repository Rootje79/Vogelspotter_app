<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Birda naar Vogelspotter App</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f4f8; color: #333; }
        .box { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 200px; margin: 15px 0; font-family: monospace; font-size: 12px; padding: 10px; border: 2px solid #ddd; box-sizing: border-box; }
        button { background: #1e40af; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        #status { margin-top: 15px; padding: 10px; border-radius: 6px; display: none; text-align: center; }
        .log-box { background: #1e293b; color: #38bdf8; padding: 15px; border-radius: 8px; margin-top: 15px; font-family: monospace; font-size: 11px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="box">
    <h2>🐦 Birda naar App Converter</h2>
    <div id="status"></div>
    
    <p>Plak hier de inhoud van je Birda CSV bestand:</p>
    <textarea id="csvInput" placeholder="Plak de CSV inhoud hier..."></textarea>
    
    <button onclick="convert()">CONVERTEER NU 🚀</button>

    <div id="log" class="log-box">Console: Wachten op actie...</div>

    <h3 style="margin-top:20px;">JSON voor Import:</h3>
    <textarea id="jsonOutput" readonly></textarea>
    <button id="downloadBtn" style="display:none; background:#10b981; margin-top:10px;" onclick="download()">DOWNLOAD .JSON</button>
</div>

<script>
let vogelAtlas = [];

// 1. Laden soorten.json
async function init() {
    const log = document.getElementById('log');
    try {
        const res = await fetch('soorten.json');
        vogelAtlas = await res.json();
        log.innerHTML = "✅ soorten.json geladen (" + vogelAtlas.length + " soorten)";
    } catch (e) {
        log.innerHTML = "⚠️ Let op: soorten.json niet gevonden. Check je GitHub.";
    }
}

// 2. CSV Parser die rekening houdt met lege velden en "PRESENT"
function convert() {
    const input = document.getElementById('csvInput').value.trim();
    const log = document.getElementById('log');
    if (!input) return;

    const lines = input.split(/\r?\n/);
    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
    
    const iSci = headers.indexOf('scientificName');
    const iCommon = headers.indexOf('commonName');
    const iLat = headers.indexOf('latitude');
    const iLon = headers.indexOf('longitude');
    const iDate = headers.indexOf('date');
    const iCount = headers.indexOf('count');
    const iSession = headers.indexOf('sessionTitle');

    const result = lines.slice(1).map((line, idx) => {
        // Splits regel, negeer komma's in aanhalingstekens (zoals in notes)
        const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/"/g, ''));
        
        if (!cols[iSci]) return null; // Sla echt lege regels over

        const sciName = cols[iSci];
        const match = vogelAtlas.find(v => v.WetSchap && v.WetSchap.toLowerCase() === sciName.toLowerCase());

        // Aantal fix: Als leeg of "PRESENT", maak er 1 van
        let aantal = parseInt(cols[iCount]);
        if (isNaN(aantal)) aantal = 1;

        return {
            id: "BIRDA-" + idx + "-" + Math.floor(Math.random() * 1000),
            species: match ? match.naam : cols[iCommon],
            latin: sciName,
            status: match ? match.status : "Onbekend",
            count: aantal,
            methode: "Gezien",
            // Als sessionTitle leeg is, geef het een standaard naam
            tag: cols[iSession] || "Birda Sessie",
            notes: "", 
            timestamp: new Date(cols[iDate]).toLocaleString('nl-NL'),
            isoDate: cols[iDate],
            synced: true,
            coords: {
                lat: parseFloat(cols[iLat]),
                lon: parseFloat(cols[iLon])
            }
        };
    }).filter(r => r !== null);

    document.getElementById('jsonOutput').value = JSON.stringify(result, null, 2);
    document.getElementById('downloadBtn').style.display = "block";
    document.getElementById('status').style.display = "block";
    document.getElementById('status').style.background = "#d1fae5";
    document.getElementById('status').innerText = "Succes! " + result.length + " waarnemingen verwerkt.";
    log.innerHTML = "✅ Verwerking voltooid.";
}

function download() {
    const content = document.getElementById('jsonOutput').value;
    const blob = new Blob([content], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = "birda_export.json";
    a.click();
}

init();
</script>
</body>
</html>
